version: "3.9"

networks:
  rag-net:

services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag-net

  fastapi:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - COLLECTION_NAME=${COLLECTION_NAME:-medical_docs}
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
    depends_on:
      - qdrant
    networks:
      - rag-net

volumes:
  qdrant_data:
