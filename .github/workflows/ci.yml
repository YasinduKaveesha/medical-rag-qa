name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ app/ tests/

      - name: Test
        run: pytest tests/ -v --tb=short -k "not slow and not integration"
        env:
          # Satisfies Settings validation — no real Groq calls are made
          # (all tests use mocks/dependency overrides)
          GROQ_API_KEY: gsk-ci-placeholder
